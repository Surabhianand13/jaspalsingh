<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Resource - Dr. Jaspal Singh</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1A1A2E" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/style.css?v=8" />
  <link rel="stylesheet" href="/css/home.css?v=8" />
  <link rel="stylesheet" href="/css/pages.css?v=8" />
  <link rel="stylesheet" href="/css/additions.css?v=8" />
  <link rel="stylesheet" href="/css/learner-auth.css" />
  <script src="/js/loader.js"></script>
  <style>
    .resource-wrap { max-width: 520px; margin: 0 auto; padding: calc(var(--header-h, 72px) + 48px) 20px 80px; text-align: center; }
    .resource-icon { font-size: 48px; color: #c81240; margin-bottom: 16px; }
    .resource-title { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    .resource-desc  { font-size: 15px; color: #64748b; margin-bottom: 32px; line-height: 1.6; }
    .auth-gate { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 32px 24px; }
    .auth-gate h3 { font-size: 16px; font-weight: 700; color: #0f172a; margin: 0 0 8px; }
    .auth-gate p  { font-size: 13px; color: #64748b; margin: 0 0 20px; }
    .auth-gate-btns { display: flex; gap: 10px; }
    .btn-signin  { flex: 1; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #fff; font-size: 14px; font-weight: 600; color: #374151; cursor: pointer; transition: border-color .15s; }
    .btn-signin:hover { border-color: #c81240; color: #c81240; }
    .btn-signup  { flex: 1; padding: 12px; background: #c81240; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .resource-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 28px 24px; text-align: left; display: none; }
    .resource-card h3 { font-size: 17px; font-weight: 700; color: #0f172a; margin: 0 0 6px; }
    .resource-card p  { font-size: 13px; color: #64748b; margin: 0 0 20px; }
    .btn-view { display: inline-flex; align-items: center; gap: 8px; background: #c81240; color: #fff; padding: 12px 22px; border-radius: 8px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .btn-view:hover { opacity: .9; color: #fff; }
    .error-state { padding: 40px 20px; color: #991b1b; font-size: 14px; background: #fef2f2; border-radius: 12px; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-main">Skip to main content</a>

  <header class="site-header" id="siteHeader" role="banner">
    <div class="container header-inner">
      <div class="header-left">
        <a href="/" class="header-brand" aria-label="Dr. Jaspal Singh - Home">
          <img src="/assets/images/jaspal-hero.png" class="header-avatar" alt="Dr. Jaspal Singh" onerror="this.style.display='none'" />
          <span class="wordmark">Dr. Jaspal Singh</span>
        </a>
      </div>
    </div>
  </header>

  <div id="main-content" class="resource-wrap">
    <div class="resource-icon"><i class="fa-solid fa-file-pdf"></i></div>
    <div class="resource-title" id="res-title">Loading...</div>
    <div class="resource-desc" id="res-desc"></div>

    <!-- Auth gate (shown when not logged in) -->
    <div class="auth-gate" id="auth-gate" style="display:none;">
      <h3>Sign in to access this resource</h3>
      <p>Create a free account or sign in - it takes 30 seconds.</p>
      <div class="auth-gate-btns">
        <button class="btn-signin" onclick="openAuth('login')">Sign In</button>
        <button class="btn-signup" onclick="openAuth('register')">Create Free Account</button>
      </div>
    </div>


  </div>

  <script src="/js/learner-auth.js"></script>
  <script>
    var API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:5000' : 'https://jaspalsingh.onrender.com';
    var TOKEN_KEY = 'jaspal_learner_token';
    var params     = new URLSearchParams(location.search);
    var resourceId = params.get('id');

    function openAuth(tab) {
      if (window.LearnerAuth) {
        LearnerAuth.showModal(onAuthSuccess);
        /* Switch to the right tab after modal opens */
        setTimeout(function () {
          var btn = document.querySelector('.lauth-tab[data-lauth-tab="' + tab + '"]');
          if (btn) btn.click();
        }, 50);
      }
    }

    function onAuthSuccess() {
      window.location.href = '/profile#free-resources';
    }

    function checkAuth() {
      var token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        /* Already logged in - go straight to profile */
        window.location.href = '/profile#free-resources';
      } else {
        document.getElementById('res-title').textContent = 'Free Resource';
        document.getElementById('res-desc').textContent  = 'Sign in or create a free account to access this resource.';
        document.getElementById('auth-gate').style.display = '';
      }
    }

    /* Start */
    checkAuth();
  </script>
</body>
</html>
