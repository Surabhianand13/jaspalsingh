<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Resource - Dr. Jaspal Singh</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1A1A2E" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/style.css?v=8" />
  <link rel="stylesheet" href="/css/home.css?v=8" />
  <link rel="stylesheet" href="/css/pages.css?v=8" />
  <link rel="stylesheet" href="/css/additions.css?v=8" />
  <link rel="stylesheet" href="/css/learner-auth.css" />
  <script src="/js/loader.js"></script>
  <style>
    .resource-wrap { max-width: 560px; margin: 80px auto; padding: 0 20px 60px; text-align: center; }
    .resource-icon { font-size: 48px; color: #c81240; margin-bottom: 16px; }
    .resource-title { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    .resource-desc  { font-size: 15px; color: #64748b; margin-bottom: 32px; line-height: 1.6; }
    .auth-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 28px 24px; text-align: left; }
    .auth-box h3 { font-size: 16px; font-weight: 700; color: #0f172a; margin: 0 0 6px; }
    .auth-box p  { font-size: 13px; color: #64748b; margin: 0 0 20px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tab  { flex: 1; padding: 9px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #fff; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; transition: all .15s; }
    .auth-tab.active { border-color: #c81240; color: #c81240; background: #fff0f4; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }
    .form-group input:focus { border-color: #c81240; }
    .btn-primary { width: 100%; padding: 12px; background: #c81240; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 10px; padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.error   { background: #fef2f2; color: #991b1b; display: block; }
    .msg.success { background: #f0fdf4; color: #166534; display: block; }
    .resource-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; text-align: left; margin-top: 24px; display: none; }
    .resource-card h3 { font-size: 17px; font-weight: 700; color: #0f172a; margin: 0 0 6px; }
    .resource-card p  { font-size: 13px; color: #64748b; margin: 0 0 16px; }
    .btn-view { display: inline-flex; align-items: center; gap: 8px; background: #c81240; color: #fff; padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .loading-state { padding: 60px 20px; color: #94a3b8; font-size: 14px; }
    #otp-section { display: none; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-main">Skip to main content</a>
  <div id="main-content" class="resource-wrap">
    <div class="resource-icon"><i class="fa-solid fa-file-pdf"></i></div>
    <div class="resource-title" id="res-title">Loading resource...</div>
    <div class="resource-desc" id="res-desc">Sign in or create a free account to access this resource.</div>

    <!-- Auth box (shown when not logged in) -->
    <div class="auth-box" id="auth-box">
      <h3>Access this resource</h3>
      <p>Sign in or create a free account - it takes 30 seconds.</p>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Login form -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" />
        </div>
        <button class="btn-primary" onclick="doLogin()">Sign In & View Resource</button>
        <div class="msg" id="login-msg"></div>
      </div>

      <!-- Signup form -->
      <div id="signup-form" style="display:none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="signup-phone" placeholder="10-digit mobile number" maxlength="10" />
        </div>
        <div id="otp-section">
          <div class="form-group">
            <label>OTP sent to your email</label>
            <input type="text" id="signup-otp" placeholder="Enter 6-digit OTP" maxlength="6" />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" />
        </div>
        <button class="btn-primary" id="signup-btn" onclick="doSignup()">Create Account & View Resource</button>
        <div class="msg" id="signup-msg"></div>
      </div>
    </div>

    <!-- Resource card (shown after login) -->
    <div class="resource-card" id="resource-card">
      <h3 id="card-title"></h3>
      <p id="card-desc"></p>
      <a href="#" id="card-link" class="btn-view" target="_blank">
        <i class="fa-solid fa-file-pdf"></i> View PDF
      </a>
    </div>
  </div>

  <script>
    const API = 'https://api.jaspalsingh.in';
    const params = new URLSearchParams(location.search);
    const resourceId = params.get('id');

    let currentTab = 'login';
    let otpSent = false;
    let resourceData = null;

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('login-form').style.display  = tab === 'login'  ? '' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }

    async function doLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMsg('login-msg', 'Please fill all fields.', 'error');
      const btn = document.querySelector('#login-form .btn-primary');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const r = await fetch(`${API}/api/learners/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Login failed');
        localStorage.setItem('learnerToken', d.token);
        showResource();
      } catch (e) {
        showMsg('login-msg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In & View Resource';
      }
    }

    async function doSignup() {
      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const phone    = document.getElementById('signup-phone').value.trim();
      const password = document.getElementById('signup-password').value;
      const otp      = document.getElementById('signup-otp').value.trim();

      if (!name || !email || !phone || !password) return showMsg('signup-msg', 'Please fill all fields.', 'error');

      const btn = document.getElementById('signup-btn');

      if (!otpSent) {
        btn.disabled = true; btn.textContent = 'Sending OTP...';
        try {
          const r = await fetch(`${API}/api/learners/send-otp`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed to send OTP');
          otpSent = true;
          document.getElementById('otp-section').style.display = '';
          btn.textContent = 'Create Account & View Resource';
          btn.disabled = false;
          showMsg('signup-msg', 'OTP sent to your email.', 'success');
        } catch (e) {
          showMsg('signup-msg', e.message, 'error');
          btn.disabled = false; btn.textContent = 'Create Account & View Resource';
        }
        return;
      }

      if (!otp) return showMsg('signup-msg', 'Please enter the OTP.', 'error');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const r = await fetch(`${API}/api/learners/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password, otp }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Registration failed');
        localStorage.setItem('learnerToken', d.token);
        showResource();
      } catch (e) {
        showMsg('signup-msg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Create Account & View Resource';
      }
    }

    async function showResource() {
      const token = localStorage.getItem('learnerToken');
      if (!token) return;
      try {
        let url = `${API}/api/free-resources`;
        if (resourceId) url += `?id=${resourceId}`;
        const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        if (!r.ok) throw new Error('Could not load resource');
        const resources = await r.json();
        const res = resourceId ? resources.find(x => String(x.id) === resourceId) : resources[0];
        if (!res) {
          document.getElementById('res-title').textContent = 'Resource not found';
          document.getElementById('res-desc').textContent = 'This resource may have been removed.';
          document.getElementById('auth-box').style.display = 'none';
          return;
        }
        document.getElementById('res-title').textContent = res.title;
        document.getElementById('res-desc').textContent = res.description || 'Your free resource is ready to view.';
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('card-title').textContent = res.title;
        document.getElementById('card-desc').textContent  = res.description || '';
        document.getElementById('card-link').href = res.pdf_url;
        document.getElementById('resource-card').style.display = '';
      } catch (e) {
        console.error(e);
      }
    }

    // Auto-show resource if already logged in
    if (localStorage.getItem('learnerToken')) showResource();
  </script>
</body>
</html>
