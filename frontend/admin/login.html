<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Dr. Jaspal Singh</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ──────────────────────────── */
    :root {
      --magenta:       #F0345A;
      --magenta-dark:  #c4284a;
      --sky-blue:      #67C8E8;
      --heading-color: #1A1A2E;
    }

    /* ── Base ───────────────────────────────────── */
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #e2e8f0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* Dark navy → dark purple gradient */
      background: linear-gradient(135deg, #0d0f1c 0%, #1A1A2E 40%, #2d1b4e 100%);
      padding: 24px 16px;
    }

    /* Subtle animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(103, 200, 232, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(240, 52, 90, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ───────────────────────────────────── */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 20px;
      padding: 40px 36px 36px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }

    /* ── Logo / wordmark ────────────────────────── */
    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-logo .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--magenta), #ff6b8a);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(240, 52, 90, 0.35);
    }

    .login-logo .logo-icon i {
      font-size: 24px;
      color: #fff;
    }

    .login-logo .site-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .login-logo .site-name span {
      color: var(--sky-blue);
    }

    .login-logo .site-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 2px;
      font-family: 'Inter', sans-serif;
    }

    /* ── Admin badge ────────────────────────────── */
    .admin-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px auto 28px;
    }

    .admin-badge span {
      background: rgba(240, 52, 90, 0.15);
      border: 1px solid rgba(240, 52, 90, 0.35);
      color: #ff7a98;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
    }

    /* ── Form ───────────────────────────────────── */
    .login-form-group {
      margin-bottom: 18px;
    }

    .login-form-group label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }

    .login-input-wrap {
      position: relative;
    }

    .login-input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14.5px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    .login-input:focus {
      border-color: rgba(103, 200, 232, 0.5);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px rgba(103, 200, 232, 0.12);
    }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: rgba(255, 255, 255, 0.7); }

    /* ── Error message ──────────────────────────── */
    .login-error {
      display: none;
      background: rgba(240, 52, 90, 0.12);
      border: 1px solid rgba(240, 52, 90, 0.3);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: #ff8fa3;
      margin-bottom: 18px;
      font-family: 'Inter', sans-serif;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .login-error.visible {
      display: flex;
    }

    .login-error i { flex-shrink: 0; }

    /* ── Submit button ──────────────────────────── */
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--magenta) 0%, #c4284a 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(240, 52, 90, 0.35);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
    }

    .login-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(240, 52, 90, 0.45);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(240, 52, 90, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .login-btn .btn-loader {
      display: none;
    }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .btn-loader { display: inline-block; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spinner { animation: spin 0.8s linear infinite; }

    /* ── Back link ──────────────────────────────── */
    .login-back {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      font-family: 'Inter', sans-serif;
    }

    .login-back a {
      color: var(--sky-blue);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .login-back a:hover { opacity: 0.75; }

    /* ── Divider ────────────────────────────────── */
    .login-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 28px 0 24px;
    }
  </style>
</head>
<body>

  <div class="login-card" role="main">

    <!-- Logo / wordmark -->
    <div class="login-logo">
      <div class="logo-icon" aria-hidden="true">
        <i class="fas fa-hard-hat"></i>
      </div>
      <div class="site-name">Dr. Jaspal <span>Singh</span></div>
      <div class="site-sub">Civil Engineering Educator</div>
    </div>

    <!-- Admin panel badge -->
    <div class="admin-badge">
      <span><i class="fas fa-lock" style="margin-right:6px;font-size:9px;"></i>Admin Panel</span>
    </div>

    <!-- Error message (hidden by default) -->
    <div class="login-error" id="loginError" role="alert" aria-live="polite">
      <i class="fas fa-circle-exclamation"></i>
      <span id="loginErrorText">Invalid credentials. Please try again.</span>
    </div>

    <!-- Login form -->
    <form id="loginForm" novalidate>
      <div class="login-form-group">
        <label for="adminEmail">Email Address</label>
        <div class="login-input-wrap">
          <i class="fas fa-envelope" aria-hidden="true"></i>
          <input
            type="email"
            id="adminEmail"
            class="login-input"
            placeholder="admin@jaspalsingh.in"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <div class="login-form-group" style="margin-bottom:24px;">
        <label for="adminPassword">Password</label>
        <div class="login-input-wrap">
          <i class="fas fa-lock" aria-hidden="true"></i>
          <input
            type="password"
            id="adminPassword"
            class="login-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="togglePwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span class="btn-text"><i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In</span>
        <span class="btn-loader"><i class="fas fa-spinner"></i> Signing in…</span>
      </button>
    </form>

    <div class="login-divider"></div>

    <!-- Back to site -->
    <div class="login-back">
      <a href="../index.html" rel="noopener">
        <i class="fas fa-arrow-left" style="margin-right:5px;font-size:11px;"></i>
        Back to main site
      </a>
    </div>

  </div><!-- /.login-card -->

  <script>
    (function () {
      'use strict';

      /* ── Config ─────────────────────────── */
      var API_BASE   = location.hostname === 'localhost' ? 'http://localhost:5000' : '';
      var TOKEN_KEY  = 'jaspal_admin_token';

      /* ── Redirect if already logged in ─── */
      if (localStorage.getItem(TOKEN_KEY)) {
        location.replace('dashboard.html');
      }

      /* ── DOM refs ───────────────────────── */
      var form      = document.getElementById('loginForm');
      var emailEl   = document.getElementById('adminEmail');
      var passEl    = document.getElementById('adminPassword');
      var btn       = document.getElementById('loginBtn');
      var errBox    = document.getElementById('loginError');
      var errText   = document.getElementById('loginErrorText');
      var togglePw  = document.getElementById('togglePw');
      var toggleIcon = document.getElementById('togglePwIcon');

      /* ── Password visibility toggle ─────── */
      togglePw.addEventListener('click', function () {
        var isPassword = passEl.type === 'password';
        passEl.type    = isPassword ? 'text' : 'password';
        toggleIcon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
      });

      /* ── Show / hide error ──────────────── */
      function showError(msg) {
        errText.textContent = msg || 'Invalid credentials. Please try again.';
        errBox.classList.add('visible');
      }

      function hideError() {
        errBox.classList.remove('visible');
      }

      /* ── Set button loading state ───────── */
      function setLoading(on) {
        btn.disabled = on;
        btn.classList.toggle('loading', on);
      }

      /* ── Form submit ────────────────────── */
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var email    = emailEl.value.trim();
        var password = passEl.value;

        /* Basic client-side validation */
        if (!email || !password) {
          showError('Please enter both email and password.');
          return;
        }

        setLoading(true);

        fetch(API_BASE + '/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: email, password: password })
        })
          .then(function (res) {
            if (!res.ok) {
              /* Try to get error message from body */
              return res.json().then(function (data) {
                throw new Error(data.message || data.error || 'Login failed. Please try again.');
              }, function () {
                throw new Error('Login failed (HTTP ' + res.status + '). Please try again.');
              });
            }
            return res.json();
          })
          .then(function (data) {
            if (!data.token) {
              throw new Error('No token received. Please try again.');
            }
            /* Store admin JWT and redirect */
            localStorage.setItem(TOKEN_KEY, data.token);
            location.replace('dashboard.html');
          })
          .catch(function (err) {
            setLoading(false);
            showError(err.message);
          });
      });

      /* Focus email on load */
      emailEl.focus();
    })();
  </script>

</body>
</html>
